<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PSID-SHELF Catalog</title>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,400;8..60,600;8..60,700&family=Source+Sans+3:wght@300;400;500;600&family=Source+Code+Pro:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --blue: #00274C;
    --blue-mid: #1B4675;
    --blue-light: #2F65A7;
    --maize: #FFCB05;
    --maize-soft: #FFF3CC;
    --maize-hover: #FFD633;
    --tan: #CFC096;
    --ash: #989C97;
    --cream: #FAFAF5;
    --white: #FFFFFF;
    --text: #1a1a1a;
    --text-secondary: #4a4a4a;
    --border: #e0ddd4;
    --shadow: 0 2px 12px rgba(0,39,76,0.08);
    --shadow-lg: 0 8px 32px rgba(0,39,76,0.12);
    --radius: 6px;
    --font-serif: 'Source Serif 4', Georgia, serif;
    --font-sans: 'Source Sans 3', system-ui, sans-serif;
    --font-mono: 'Source Code Pro', monospace;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: var(--font-sans);
    background: var(--cream);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── HEADER ── */
  .header {
    background: var(--blue);
    padding: 0;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
  }
  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    max-width: 1200px;
    margin: 0 auto;
    padding: 16px 24px;
  }
  .header-title {
    display: flex;
    align-items: baseline;
    gap: 12px;
  }
  .header-title h1 {
    font-family: var(--font-serif);
    font-weight: 700;
    font-size: 1.6rem;
    color: var(--maize);
    letter-spacing: -0.02em;
  }
  .header-title .subtitle {
    font-size: 0.85rem;
    color: rgba(255,255,255,0.6);
    font-weight: 300;
  }
  .header-badge {
    background: rgba(255,203,5,0.15);
    border: 1px solid rgba(255,203,5,0.3);
    color: var(--maize);
    font-size: 0.7rem;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 20px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  /* ── TABS ── */
  .tab-bar {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 24px;
    display: flex;
    gap: 0;
  }
  .tab-btn {
    padding: 10px 24px;
    font-family: var(--font-sans);
    font-size: 0.85rem;
    font-weight: 500;
    color: rgba(255,255,255,0.55);
    background: transparent;
    border: none;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
    letter-spacing: 0.02em;
  }
  .tab-btn:hover {
    color: rgba(255,255,255,0.85);
  }
  .tab-btn.active {
    color: var(--maize);
    border-bottom-color: var(--maize);
  }

  /* ── MAIN ── */
  .main {
    max-width: 1200px;
    margin: 0 auto;
    padding: 28px 24px 60px;
  }

  /* ── SEARCH ── */
  .search-area {
    margin-bottom: 24px;
  }
  .search-box {
    position: relative;
  }
  .search-box input {
    width: 100%;
    padding: 14px 20px 14px 48px;
    font-family: var(--font-sans);
    font-size: 1rem;
    border: 2px solid var(--border);
    border-radius: var(--radius);
    background: var(--white);
    color: var(--text);
    transition: border-color 0.2s, box-shadow 0.2s;
    outline: none;
  }
  .search-box input:focus {
    border-color: var(--blue-light);
    box-shadow: 0 0 0 3px rgba(47,101,167,0.12);
  }
  .search-box input::placeholder {
    color: var(--ash);
  }
  .search-icon {
    position: absolute;
    left: 16px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--ash);
    pointer-events: none;
  }

  /* ── RESULTS PANEL ── */
  .panel {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    overflow: hidden;
  }
  .panel-header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: linear-gradient(to bottom, #fafaf8, #f5f4f0);
  }
  .panel-header h3 {
    font-family: var(--font-serif);
    font-size: 1.05rem;
    font-weight: 600;
    color: var(--blue);
  }
  .panel-header .meta {
    font-size: 0.8rem;
    color: var(--ash);
  }

  /* ── VARIABLE FINDER RESULTS ── */
  .var-results {
    padding: 0;
  }
  .var-topic {
    border-bottom: 1px solid var(--border);
  }
  .var-topic:last-child {
    border-bottom: none;
  }
  .var-topic-header {
    padding: 14px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    cursor: pointer;
    transition: background 0.15s;
  }
  .var-topic-header:hover {
    background: var(--maize-soft);
  }
  .var-topic-name {
    font-weight: 600;
    color: var(--blue);
    font-size: 0.95rem;
  }
  .var-topic-count {
    font-size: 0.75rem;
    color: var(--white);
    background: var(--blue-light);
    padding: 2px 10px;
    border-radius: 12px;
    font-weight: 500;
  }
  .var-topic-vars {
    padding: 0 20px 14px;
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .var-chip {
    font-family: var(--font-mono);
    font-size: 0.78rem;
    background: var(--maize-soft);
    color: var(--blue);
    padding: 4px 10px;
    border-radius: 4px;
    border: 1px solid rgba(255,203,5,0.3);
    font-weight: 500;
  }
  .var-chip.highlight {
    background: var(--maize);
    border-color: var(--maize);
    font-weight: 600;
  }

  /* ── DATA TABLE ── */
  .table-controls {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
    background: linear-gradient(to bottom, #fafaf8, #f5f4f0);
  }
  .table-controls label {
    font-size: 0.85rem;
    font-weight: 500;
    color: var(--text-secondary);
  }
  .table-controls select {
    font-family: var(--font-sans);
    font-size: 0.85rem;
    padding: 8px 12px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--white);
    color: var(--text);
    cursor: pointer;
    min-width: 200px;
  }
  .table-controls select:focus {
    outline: none;
    border-color: var(--blue-light);
  }
  .table-info {
    margin-left: auto;
    font-size: 0.8rem;
    color: var(--ash);
  }
  .table-wrap {
    overflow-x: auto;
    max-height: 500px;
    overflow-y: auto;
  }
  .data-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.82rem;
    white-space: nowrap;
  }
  .data-table thead {
    position: sticky;
    top: 0;
    z-index: 5;
  }
  .data-table th {
    background: var(--blue);
    color: var(--maize);
    padding: 10px 14px;
    text-align: left;
    font-family: var(--font-mono);
    font-weight: 500;
    font-size: 0.75rem;
    letter-spacing: 0.02em;
    border-right: 1px solid rgba(255,255,255,0.1);
    cursor: pointer;
    user-select: none;
  }
  .data-table th:hover {
    background: var(--blue-mid);
  }
  .data-table td {
    padding: 8px 14px;
    border-bottom: 1px solid var(--border);
    border-right: 1px solid #f0efe8;
    font-family: var(--font-mono);
    font-size: 0.8rem;
    color: var(--text-secondary);
  }
  .data-table tr:hover td {
    background: var(--maize-soft);
  }
  .data-table td.empty {
    color: #ccc;
    font-style: italic;
  }
  .preview-banner {
    padding: 10px 20px;
    background: linear-gradient(90deg, var(--maize-soft), var(--white));
    border-top: 1px solid var(--border);
    font-size: 0.8rem;
    color: var(--text-secondary);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .preview-banner strong {
    color: var(--blue);
  }

  /* ── CROSSWALK TAB ── */
  .crosswalk-placeholder {
    padding: 60px 40px;
    text-align: center;
  }
  .crosswalk-placeholder .icon {
    font-size: 3rem;
    margin-bottom: 16px;
    opacity: 0.3;
  }
  .crosswalk-placeholder h3 {
    font-family: var(--font-serif);
    font-size: 1.3rem;
    color: var(--blue);
    margin-bottom: 8px;
  }
  .crosswalk-placeholder p {
    color: var(--text-secondary);
    font-size: 0.95rem;
    max-width: 500px;
    margin: 0 auto;
    line-height: 1.6;
  }
  .crosswalk-placeholder a {
    color: var(--blue-light);
    text-decoration: none;
    border-bottom: 1px solid rgba(47,101,167,0.3);
  }
  .crosswalk-placeholder a:hover {
    border-bottom-color: var(--blue-light);
  }

  /* ── FOOTER ── */
  .footer {
    max-width: 1200px;
    margin: 0 auto;
    padding: 20px 24px 40px;
    font-size: 0.78rem;
    color: var(--ash);
    line-height: 1.6;
  }
  .footer a {
    color: var(--blue-light);
    text-decoration: none;
  }

  /* ── EMPTY STATE ── */
  .empty-state {
    padding: 48px 24px;
    text-align: center;
    color: var(--text-secondary);
  }
  .empty-state .icon {
    font-size: 2.5rem;
    margin-bottom: 12px;
    opacity: 0.25;
  }
  .empty-state h4 {
    font-family: var(--font-serif);
    color: var(--blue);
    margin-bottom: 6px;
  }

  /* ── INTRO CARD ── */
  .intro-card {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px 28px;
    margin-bottom: 20px;
    box-shadow: var(--shadow);
    border-left: 4px solid var(--maize);
  }
  .intro-card h2 {
    font-family: var(--font-serif);
    font-size: 1.15rem;
    color: var(--blue);
    margin-bottom: 8px;
  }
  .intro-card p {
    font-size: 0.9rem;
    color: var(--text-secondary);
    line-height: 1.6;
  }
  .stats-row {
    display: flex;
    gap: 24px;
    margin-top: 14px;
    flex-wrap: wrap;
  }
  .stat {
    display: flex;
    align-items: baseline;
    gap: 6px;
  }
  .stat .num {
    font-family: var(--font-serif);
    font-size: 1.4rem;
    font-weight: 700;
    color: var(--blue);
  }
  .stat .label {
    font-size: 0.8rem;
    color: var(--ash);
  }

  @media (max-width: 640px) {
    .header-title h1 { font-size: 1.2rem; }
    .header-title .subtitle { display: none; }
    .tab-btn { padding: 10px 14px; font-size: 0.8rem; }
    .main { padding: 16px 12px 40px; }
    .stats-row { gap: 16px; }
    .table-controls { flex-direction: column; align-items: flex-start; }
    .table-info { margin-left: 0; }
  }
</style>
</head>
<body>

<header class="header">
  <div class="header-top">
    <div class="header-title">
      <h1>PSID-SHELF Catalog</h1>
      <span class="subtitle">Plain English to Plain CSV</span>
    </div>
    <span class="header-badge">Preview &middot; 10-Row Sample</span>
  </div>
  <div class="tab-bar" id="tab-bar">
    <button class="tab-btn active" data-tab="finder">Variable Finder</button>
    <button class="tab-btn" data-tab="explorer">Data Explorer</button>
    <button class="tab-btn" data-tab="crosswalk">PSID Crosswalk</button>
  </div>
</header>

<main class="main" id="main-content">
  <!-- Content injected by JS -->
</main>

<footer class="footer">
  <p>
    PSID-SHELF data by Pfeffer, Daumler &amp; Friedman &middot;
    <a href="https://doi.org/10.3886/E194322V2" target="_blank">doi.org/10.3886/E194322V2</a> &middot;
    Data shown is a 10-row preview of 84,121 total observations &middot;
    <a href="https://joe-foley.gitbook.io/psid-book" target="_blank">PSID Book</a>
  </p>
</footer>

const TOPIC_LABELS = {"covid":"COVID-19","demographics":"Demographics","depression":"Depression","earnings_nominal":"Earnings (Nominal)","earnings_real":"Earnings (Real)","education":"Education","employment":"Employment","expenditures_health":"Expenditures: Health","expenditures_household":"Expenditures: Household","expenditures_personal":"Expenditures: Personal","expenditures_totals":"Expenditures: Totals","family_income":"Family Income","family_structure":"Family Structure","geography":"Geography","health_chronic":"Health: Chronic Conditions","health_general":"Health: General","housing":"Housing","race_ethnicity":"Race & Ethnicity","time_use":"Time Use","wealth_business":"Wealth: Business","wealth_debt":"Wealth: Debt","wealth_home":"Wealth: Home","wealth_investments":"Wealth: Investments","wealth_other_assets":"Wealth: Other Assets","wealth_real_estate":"Wealth: Real Estate","wealth_savings":"Wealth: Savings","wealth_totals_assets":"Wealth: Total Assets","wealth_totals_debt":"Wealth: Total Debt","wealth_totals_net":"Wealth: Net Worth","wealth_vehicles":"Wealth: Vehicles"};
const VAR_DESCRIPTIONS = {"COVID":"covid coronavirus pandemic vaccination testing hospitalization symptoms long covid","DEMO":"demographics sex gender age birth year death","DEP":"depression mental health score screening","EARN":"earnings income wages salary labor","EDU":"education school college degree years attainment","EMP":"employment job work occupation labor force status","EXPN":"expenditures spending consumption food health housing childcare","FINC":"family income total household money","FAM":"family structure size composition household","GEO":"geography region state location metropolitan","CCON":"chronic conditions health disease diagnosis arthritis asthma cancer diabetes heart hypertension lung stroke","GHLTH":"general health status self-rated wellbeing","HOME":"housing homeownership rent mortgage property value","RACE_ETH":"race ethnicity racial identity hispanic","TIME":"time use housework childcare education leisure","WLTH":"wealth assets net worth savings investments real estate vehicles business debt"};

// ═══════════════ APP STATE ═══════════════
let currentTab = 'finder';
let searchQuery = '';
let selectedTopic = 'demographics';
let expandedTopics = new Set();

// ═══════════════ TAB SWITCHING ═══════════════
document.getElementById('tab-bar').addEventListener('click', e => {
  const btn = e.target.closest('.tab-btn');
  if (!btn) return;
  currentTab = btn.dataset.tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b === btn));
  render();
});

// ═══════════════ SEARCH ═══════════════
function searchVariables(query) {
  if (!query || query.length < 2) return null;
  const terms = query.toLowerCase().split(/\s+/);
  const results = {};

  for (const [topic, prefixes] of Object.entries(SEARCH_INDEX)) {
    const topicLabel = (TOPIC_LABELS[topic] || topic).toLowerCase();
    const allCols = SHELF_DATA[topic].columns;

    // Check topic-level match
    let topicMatch = terms.some(t => topicLabel.includes(t));

    // Check variable description match
    for (const [prefix, desc] of Object.entries(VAR_DESCRIPTIONS)) {
      if (terms.some(t => desc.includes(t))) {
        if (prefixes.some(p => p.startsWith(prefix))) {
          topicMatch = true;
        }
      }
    }

    // Check individual variable name match
    const matchedPrefixes = prefixes.filter(p => {
      const pLower = p.toLowerCase().replace(/_/g, ' ');
      return terms.some(t => pLower.includes(t) || p.toLowerCase().includes(t));
    });

    if (topicMatch || matchedPrefixes.length > 0) {
      results[topic] = {
        allPrefixes: prefixes,
        matchedPrefixes: matchedPrefixes,
        topicMatch: topicMatch,
        colCount: SHELF_DATA[topic].col_count
      };
    }
  }
  return Object.keys(results).length > 0 ? results : null;
}

// ═══════════════ RENDER ═══════════════
function render() {
  const main = document.getElementById('main-content');
  if (currentTab === 'finder') renderFinder(main);
  else if (currentTab === 'explorer') renderExplorer(main);
  else renderCrosswalk(main);
}

function renderFinder(container) {
  const results = searchQuery ? searchVariables(searchQuery) : null;
  const topicKeys = Object.keys(TOPIC_LABELS).sort((a,b) => TOPIC_LABELS[a].localeCompare(TOPIC_LABELS[b]));
  const totalVars = Object.values(SHELF_DATA).reduce((s, d) => s + d.col_count - 3, 0);

  let html = `
    <div class="intro-card">
      <h2>Find Your Variable</h2>
      <p>Search across all 30 PSID-SHELF topics by plain language or variable name. Type what you're looking for — income, education, health, housing — and see which SHELF variables match.</p>
      <div class="stats-row">
        <div class="stat"><span class="num">30</span><span class="label">Topics</span></div>
        <div class="stat"><span class="num">${totalVars.toLocaleString()}</span><span class="label">Variables</span></div>
        <div class="stat"><span class="num">84,121</span><span class="label">Individuals</span></div>
        <div class="stat"><span class="num">1968–2021</span><span class="label">Coverage</span></div>
      </div>
    </div>
    <div class="search-area">
      <div class="search-box">
        <svg class="search-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="text" id="search-input" placeholder="Search: income, education, health, housing, wealth..." value="${searchQuery}" />
      </div>
    </div>`;

  if (searchQuery && !results) {
    html += `
      <div class="panel">
        <div class="empty-state">
          <div class="icon">&#128269;</div>
          <h4>No variables found</h4>
          <p>Try broader terms like "income", "health", or "education"</p>
        </div>
      </div>`;
  } else if (results) {
    const matchCount = Object.values(results).reduce((s, r) => s + r.allPrefixes.length, 0);
    html += `<div class="panel">
      <div class="panel-header">
        <h3>Results</h3>
        <span class="meta">${Object.keys(results).length} topics &middot; ${matchCount} variable groups</span>
      </div>
      <div class="var-results">`;

    for (const [topic, info] of Object.entries(results)) {
      const isExpanded = expandedTopics.has(topic);
      html += `
        <div class="var-topic">
          <div class="var-topic-header" data-expand="${topic}">
            <span class="var-topic-name">${TOPIC_LABELS[topic] || topic}</span>
            <span class="var-topic-count">${info.allPrefixes.length} variables &middot; ${SHELF_DATA[topic].col_count} columns</span>
          </div>
          ${isExpanded ? `<div class="var-topic-vars">
            ${info.allPrefixes.map(p => `<span class="var-chip${info.matchedPrefixes.includes(p) ? ' highlight' : ''}">${p}</span>`).join('')}
          </div>` : ''}
        </div>`;
    }
    html += `</div></div>`;
  } else {
    // Show all topics as browseable list
    html += `<div class="panel">
      <div class="panel-header">
        <h3>All Topics</h3>
        <span class="meta">Click to expand &middot; 30 topics</span>
      </div>
      <div class="var-results">`;
    for (const topic of topicKeys) {
      const prefixes = SEARCH_INDEX[topic] || [];
      const isExpanded = expandedTopics.has(topic);
      html += `
        <div class="var-topic">
          <div class="var-topic-header" data-expand="${topic}">
            <span class="var-topic-name">${TOPIC_LABELS[topic]}</span>
            <span class="var-topic-count">${prefixes.length} variables &middot; ${SHELF_DATA[topic].col_count} columns</span>
          </div>
          ${isExpanded ? `<div class="var-topic-vars">
            ${prefixes.map(p => `<span class="var-chip">${p}</span>`).join('')}
          </div>` : ''}
        </div>`;
    }
    html += `</div></div>`;
  }

  container.innerHTML = html;

  // Attach search listener
  const input = document.getElementById('search-input');
  input.addEventListener('input', e => {
    searchQuery = e.target.value.trim();
    expandedTopics.clear();
    render();
    // Re-focus and set cursor position
    const newInput = document.getElementById('search-input');
    newInput.focus();
    newInput.setSelectionRange(newInput.value.length, newInput.value.length);
  });

  // Attach expand listeners
  container.querySelectorAll('[data-expand]').forEach(el => {
    el.addEventListener('click', () => {
      const topic = el.dataset.expand;
      if (expandedTopics.has(topic)) expandedTopics.delete(topic);
      else expandedTopics.add(topic);
      render();
      // Re-focus search if it was active
      if (searchQuery) {
        const newInput = document.getElementById('search-input');
        newInput.focus();
        newInput.setSelectionRange(newInput.value.length, newInput.value.length);
      }
    });
  });
}

function renderExplorer(container) {
  const topicKeys = Object.keys(TOPIC_LABELS).sort((a,b) => TOPIC_LABELS[a].localeCompare(TOPIC_LABELS[b]));
  const data = SHELF_DATA[selectedTopic];

  let html = `
    <div class="intro-card">
      <h2>Data Explorer</h2>
      <p>Preview the first 10 rows of any PSID-SHELF topic. Select a topic below to see its structure and sample data. Full dataset contains 84,121 observations.</p>
    </div>
    <div class="panel">
      <div class="table-controls">
        <label for="topic-select">Topic:</label>
        <select id="topic-select">
          ${topicKeys.map(t => `<option value="${t}" ${t === selectedTopic ? 'selected' : ''}>${TOPIC_LABELS[t]}</option>`).join('')}
        </select>
        <span class="table-info">${data.col_count} columns &middot; showing first ${data.preview_cols.length} &middot; ${data.preview_rows.length} of 84,121 rows</span>
      </div>
      <div class="table-wrap">
        <table class="data-table">
          <thead><tr>${data.preview_cols.map(c => `<th>${c}</th>`).join('')}</tr></thead>
          <tbody>
            ${data.preview_rows.map(row => `<tr>${row.map(cell => {
              if (cell === '' || cell === null || cell === undefined)
                return '<td class="empty">&mdash;</td>';
              return `<td>${cell}</td>`;
            }).join('')}</tr>`).join('')}
          </tbody>
        </table>
      </div>
      <div class="preview-banner">
        <strong>&#9432; Preview:</strong> Showing 10 of 84,121 rows and ${data.preview_cols.length} of ${data.col_count} columns.
        Full PSID-SHELF data available at <a href="https://doi.org/10.3886/E194322V2" target="_blank" style="color:var(--blue-light)">Open ICPSR</a>.
      </div>
    </div>`;

  container.innerHTML = html;

  document.getElementById('topic-select').addEventListener('change', e => {
    selectedTopic = e.target.value;
    render();
  });
}

function renderCrosswalk(container) {
  container.innerHTML = `
    <div class="intro-card">
      <h2>PSID Crosswalk</h2>
      <p>Map PSID-SHELF harmonized variable names back to the original raw PSID variable names.</p>
    </div>
    <div class="panel">
      <div class="crosswalk-placeholder">
        <div class="icon">&#128279;</div>
        <h3>Coming Soon</h3>
        <p>This tab will map each SHELF variable (e.g. <code style="font-family:var(--font-mono);background:var(--maize-soft);padding:2px 6px;border-radius:3px;">EDU_YEAR_1968</code>) back to its original raw PSID variable name, so researchers can trace the lineage of any harmonized measure.</p>
        <p style="margin-top:12px;">In the meantime, consult the <a href="http://fabianpfeffer.com/wp-content/uploads/DaumlerFriedmanPfeffer2025.pdf" target="_blank">PSID-SHELF User Guide &amp; Codebook</a> for variable construction details.</p>
      </div>
    </div>`;
}

// Initial render
render();
</script>
